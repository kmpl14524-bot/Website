<!-- PREMIUM INTEGRATED FORM ROUTING SYSTEM -->
    <section id="requirement-form" class="py-16 max-w-3xl mx-auto px-4 sm:px-6">
        <div class="bg-white p-6 sm:p-10 rounded-2xl shadow-xl border border-slate-100 space-y-6">
            <div class="text-center space-y-1">
                <h3 class="text-xl sm:text-2xl font-bold text-kiptas-navy">Submit Your Requirements</h3>
                <p class="text-xs sm:text-sm text-slate-500">Fill in your details securely below. Our data analyst network captures parameters instantly.</p>
            </div>
            
            <!-- Sleek Front-end Form that sends data directly to Google Forms in the background -->
            <form id="kiptas-lead-form" class="space-y-4" onsubmit="submitToGoogleForm(event)">
                <div class="grid sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Your Full Name</label>
                        <input type="text" id="form-name" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:border-kiptas-gold text-sm bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Contact Number</label>
                        <input type="tel" id="form-phone" required class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:border-kiptas-gold text-sm bg-slate-50">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">What solution do you want parameters for?</label>
                    <select id="form-service" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:border-kiptas-gold text-sm bg-slate-50 text-slate-700 font-medium" onchange="adjustFormQuestions()">
                        <option value="Mutual Funds">Mutual Funds Investment Setup</option>
                        <option value="Deposit">Fixed / Recurring Deposit Portfolios</option>
                        <option value="Insurance">Life & Health Protection Covers</option>
                        <option value="Motor Insurance">Motor Insurance (Car / Bike)</option>
                        <option value="General Insurance">General Insurance Suite</option>
                        <option value="Loan">Loans / Credit Lines</option>
                    </select>
                </div>

                <!-- DYNAMICALLY ADAPTING QUESTION FIELDS -->
                <div id="dynamic-fields" class="bg-kiptas-light p-4 rounded-xl border border-slate-200/50 space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1" id="lbl-f1">Target Monthly Capital / Lump Sum Allocation (₹)</label>
                        <input type="text" id="custom-field-1" value="₹5,000 / Month" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-kiptas-gold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 uppercase mb-1" id="lbl-f2">Target Horizon Duration Milestone</label>
                        <input type="text" id="custom-field-2" value="3 to 5 Years" class="w-full px-4 py-2 border border-slate-200 rounded-lg text-sm bg-white focus:outline-none focus:border-kiptas-gold">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Additional Queries / Specific Notes</label>
                    <textarea id="form-msg" rows="3" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:border-kiptas-gold text-sm bg-slate-50" placeholder="Please mention any structural requests or timeline markers..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-kiptas-navy hover:bg-slate-800 text-white font-bold py-3 rounded-lg transition-colors text-sm shadow-md shadow-kiptas-navy/10">
                    Request Secure Callback Quote
                </button>
            </form>
        </div>
    </section>

    <!-- HIDE THE ORIGINAL GOOGLE FORM LINK IN THE JAVASCRIPT BACKGROUND ENGINE -->
    <script>
        function submitToGoogleForm(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = "Processing Securely...";
            submitBtn.disabled = true;

            // Gathering details from your premium website form inputs
            const name = document.getElementById('form-name').value;
            const phone = document.getElementById('form-phone').value;
            const service = document.getElementById('form-service').value;
            const f1 = document.getElementById('custom-field-1').value;
            const f2 = document.getElementById('custom-field-2').value;
            const msg = document.getElementById('form-msg').value;

            // Merging fields into one master paragraph to feed smoothly into your Google Form's open fields
            const fullRequirementNotes = `Service Requested: ${service} | Detail 1: ${f1} | Detail 2: ${f2} | Message: ${msg}`;

            // Target your official Google Form submission pipeline endpoint directly
            const googleFormBaseUrl = "https://docs.google.com/forms/d/e/1FAIpQLScuLHDGthGiY5Ohid-RW6A7-FQuUuaoSLnyGOv0m0vCEa2OpQ/formResponse";
            
            // Build the background package
            const formData = new FormData();
            
            // Google Form field entries map
            formData.append("entry.2005620554", name); // Passes Name directly to Google Form "Full Name" 
            formData.append("entry.1166974658", phone); // Passes Contact Number
            formData.append("entry.839337160", fullRequirementNotes); // Passes all structural criteria safely into your description sheet block

            // Send data silently in the background
            fetch(googleFormBaseUrl, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                alert(`Success! Thank you, ${name}. Your requirements profile has been securely fed directly to our management dashboard database.`);
                document.getElementById('kiptas-lead-form').reset();
                submitBtn.innerText = "Request Secure Callback Quote";
                submitBtn.disabled = false;
            }).catch(error => {
                console.error('Error submitting form', error);
                submitBtn.innerText = "Request Secure Callback Quote";
                submitBtn.disabled = false;
            });
        }
    </script>
